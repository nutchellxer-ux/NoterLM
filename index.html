<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoterLM - Your AI-Powered Notes</title>
    <link rel="stylesheet" href="/src/index.css">
  </head>
  <body class="bg-[#f5f5f5] text-[#1a1a1a] font-sans selection:bg-emerald-100">
    <div id="app" class="min-h-screen flex flex-col">
      <!-- Header -->
      <header class="sticky top-0 z-10 bg-white/80 backdrop-blur-md border-b border-black/5 px-6 py-4">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-emerald-200">
              <span class="text-xl font-bold italic">N</span>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">NoterLM</h1>
          </div>
          
          <div class="flex-1 max-w-md mx-8">
            <div class="relative group">
              <input 
                type="text" 
                id="search-input"
                placeholder="Search for notes..." 
                class="w-full bg-black/5 border-none rounded-2xl py-2.5 pl-11 pr-4 focus:ring-2 focus:ring-emerald-500/20 transition-all outline-none"
              >
              <div class="absolute left-4 top-1/2 -translate-y-1/2 text-black/40 group-focus-within:text-emerald-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              </div>
            </div>
          </div>

          <button 
            id="new-note-btn"
            class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-2xl font-medium transition-all shadow-lg shadow-emerald-200 flex items-center gap-2 active:scale-95"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            Create Note
          </button>
        </div>
      </header>

      <!-- Main Content -->
      <main class="flex-1 max-w-5xl mx-auto w-full p-6">
        <div id="notes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <!-- Notes will be injected here -->
          <div class="col-span-full flex flex-col items-center justify-center py-20 text-black/20">
            <div class="animate-pulse">Loading your thoughts...</div>
          </div>
        </div>
      </main>

      <!-- Note Editor Modal (Hidden by default) -->
      <div id="editor-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/20 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300">
          <div class="p-6 border-b border-black/5 flex items-center justify-between">
            <input 
              type="text" 
              id="note-title" 
              placeholder="Note Title" 
              class="text-2xl font-bold w-full outline-none placeholder:text-black/20"
            >
            <button id="close-modal" class="p-2 hover:bg-black/5 rounded-full transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
          </div>
          <div class="p-6">
            <textarea 
              id="note-content" 
              placeholder="Start writing..." 
              class="w-full h-64 resize-none outline-none text-lg leading-relaxed placeholder:text-black/20"
            ></textarea>
          </div>
          <div class="p-6 bg-black/[0.02] border-top border-black/5 flex justify-end gap-3">
            <button id="delete-note-btn" class="hidden px-5 py-2.5 rounded-2xl font-medium text-red-600 hover:bg-red-50 transition-colors">
              Delete
            </button>
            <button id="save-note-btn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-2.5 rounded-2xl font-medium transition-all shadow-lg shadow-emerald-200 active:scale-95">
              Save Note
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
